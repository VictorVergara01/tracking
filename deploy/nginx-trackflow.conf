# nginx site para TrackFlow.
# El TLS lo termina Cloudflare (tunnel), por eso este server escucha en :80.
# Copialo a /etc/nginx/sites-available/trackflow y enlazalo en sites-enabled.

server {
    listen 80;
    server_name trackflow.tudominio.com;   # <-- tu dominio en Cloudflare

    # El cliente web y la API se sirven desde el mismo origen (FastAPI en :8000).
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
